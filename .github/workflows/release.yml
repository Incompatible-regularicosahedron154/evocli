name: Release

# ── 触发条件 ──────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag（如 v0.2.0）'
        required: true
        type: string
      draft:
        description: '发布为草稿'
        required: false
        type: boolean
        default: false
      prerelease:
        description: '标记为预发布'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BIN: evocli

permissions:
  contents: write

jobs:
  build:
    name: Build · ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - name: linux-aarch64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            use_cross: true
          - name: windows-x86_64
            target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk \
            /opt/hostedtoolcache/Ruby /opt/google/chrome \
            /usr/local/share/powershell /usr/share/swift /usr/lib/jvm 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          sudo apt-get clean 2>/dev/null || true
          df -h /

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "ARCHIVE_NAME=${{ env.BIN }}-${VERSION}-${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --bin ${{ env.BIN }} --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --bin ${{ env.BIN }} --target ${{ matrix.target }}

      - name: Pack (Unix)
        if: runner.os == 'Linux'
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
          ARCHIVE_NAME: ${{ steps.ver.outputs.ARCHIVE_NAME }}
        run: |
          set -e
          BIN_PATH="target/${{ matrix.target }}/release/${{ env.BIN }}"
          S="${ARCHIVE_NAME}"
          mkdir -p "${S}/evocli-soul"
          [[ "${{ matrix.use_cross }}" != "true" ]] && strip "${BIN_PATH}" 2>/dev/null || true
          cp "${BIN_PATH}" "${S}/${{ env.BIN }}" && chmod +x "${S}/${{ env.BIN }}"
          cp -r evocli-soul/evocli_soul    "${S}/evocli-soul/"
          cp    evocli-soul/pyproject.toml "${S}/evocli-soul/"
          find "${S}/evocli-soul" \( -name "__pycache__" -o -name "*.pyc" \) -exec rm -rf {} + 2>/dev/null || true
          cp scripts/setup_dist.sh     "${S}/setup.sh" && chmod +x "${S}/setup.sh"
          cp scripts/preflight.py      "${S}/preflight.py"
          cp scripts/download_models.py "${S}/download_models.py"
          cp scripts/setup_env.py      "${S}/setup_env.py"
          cp README.zh-CN.md "${S}/README.md" 2>/dev/null || cp README.md "${S}/README.md"
          cp CHANGELOG.md "${S}/CHANGELOG.md" 2>/dev/null || true
          df -h /
          tar -czf "${ARCHIVE_NAME}.tar.gz" "${S}/"
          sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
          rm -rf "${S}"
          ls -lh "${ARCHIVE_NAME}.tar.gz"

      - name: Pack (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
          ARCHIVE_NAME: ${{ steps.ver.outputs.ARCHIVE_NAME }}
        run: |
          $S = $env:ARCHIVE_NAME
          New-Item -ItemType Directory -Force -Path $S | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${{ env.BIN }}.exe" "$S\${{ env.BIN }}.exe"
          New-Item -ItemType Directory -Force -Path "$S\evocli-soul" | Out-Null
          Copy-Item "evocli-soul\evocli_soul" "$S\evocli-soul\" -Recurse -Force
          Copy-Item "evocli-soul\pyproject.toml" "$S\evocli-soul\" -Force
          Get-ChildItem "$S\evocli-soul" -Recurse -Filter "__pycache__" -EA SilentlyContinue | Remove-Item -Recurse -Force -EA SilentlyContinue
          Get-ChildItem "$S\evocli-soul" -Recurse -Filter "*.pyc" -EA SilentlyContinue | Remove-Item -Force -EA SilentlyContinue
          Copy-Item "scripts\setup_dist.ps1"    "$S\setup.ps1"
          Copy-Item "scripts\preflight.py"       "$S\preflight.py"
          Copy-Item "scripts\download_models.py" "$S\download_models.py"
          Copy-Item "scripts\setup_env.py"       "$S\setup_env.py"
          $utf8 = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText("$S\setup.sh", (Get-Content "scripts\setup_dist.sh" -Raw), $utf8)
          $readme = if (Test-Path "README.zh-CN.md") { "README.zh-CN.md" } else { "README.md" }
          Copy-Item $readme "$S\README.md"
          if (Test-Path "CHANGELOG.md") { Copy-Item "CHANGELOG.md" "$S\CHANGELOG.md" }
          $ZipName = "$env:ARCHIVE_NAME.zip"
          Compress-Archive -Path "$S\*" -DestinationPath $ZipName
          $Hash = (Get-FileHash -Algorithm SHA256 $ZipName).Hash.ToLower()
          "$Hash  $ZipName" | Out-File "$ZipName.sha256" -Encoding utf8
          Get-Item $ZipName | Select-Object Name, @{N='SizeMB';E={[math]::Round($_.Length/1MB,1)}}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.name }}
          path: ${{ steps.ver.outputs.ARCHIVE_NAME }}.*
          retention-days: 1

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Merge checksums
        run: |
          cd dist/ && cat *.sha256 | sort > checksums-sha256.txt && rm -f *.sha256
          echo "=== Artifacts ==="; ls -lh

      - name: Extract release notes
        id: notes
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
        run: |
          python3 - << 'EOF'
          import re, os
          ver = os.environ["VERSION"].lstrip("v")
          try:
              with open("CHANGELOG.md", encoding="utf-8") as f:
                  content = f.read()
              m = re.search(rf"## \[{re.escape(ver)}\][^\n]*\n(.*?)(?=\n## |\Z)", content, re.DOTALL)
              notes = m.group(1).strip() if m else "See CHANGELOG.md for details."
          except Exception:
              notes = "See CHANGELOG.md for details."
          notes = notes[:6000] + ("\n\n_[截断]_" if len(notes) > 6000 else "")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("NOTES<<EOFNOTES\n" + notes + "\nEOFNOTES\n")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.VERSION }}
          name: "EvoCLI ${{ steps.ver.outputs.VERSION }}"
          draft: ${{ inputs.draft || false }}
          prerelease: ${{ inputs.prerelease || false }}
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums-sha256.txt
          body: |
            ## EvoCLI ${{ steps.ver.outputs.VERSION }}

            **Personal AI Engineering Runtime** — Rust Host + Python Soul

            ${{ steps.notes.outputs.NOTES }}

            ---

            ### 安装

            **Windows**
            ```powershell
            # 解压 zip 后：
            .\setup.ps1 && .\evocli.exe init && .\evocli.exe
            ```

            **Linux x86_64**
            ```bash
            tar -xzf evocli-${{ steps.ver.outputs.VERSION }}-linux-x86_64.tar.gz
            cd evocli-${{ steps.ver.outputs.VERSION }}-linux-x86_64/
            bash setup.sh && ./evocli init && ./evocli
            ```

            ### 平台

            | 平台 | 文件 |
            |------|------|
            | Linux x86_64 | `evocli-${{ steps.ver.outputs.VERSION }}-linux-x86_64.tar.gz` |
            | Linux aarch64 | `evocli-${{ steps.ver.outputs.VERSION }}-linux-aarch64.tar.gz` |
            | Windows x86_64 | `evocli-${{ steps.ver.outputs.VERSION }}-windows-x86_64.zip` |

            > **macOS**: 暂不提供预编译包（ONNX Runtime 依赖需本地构建）。
            > 源码构建：`cargo build --release --bin evocli`

            ```bash
            sha256sum --check checksums-sha256.txt
            ```
